# Home automation stack — tour GPU
# Services: Home Assistant + Mosquitto + Ambisync
# Lancer: docker compose up -d

services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host         # requis pour mDNS discovery (Hue, Philips TV)
    volumes:
      - ./ha_config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Paris

  # --- Pi-hole désactivé temporairement ---
  # Raison: bloque Google Analytics et services utiles, tour pas H24, gain marginal vs debloat ADB + uBlock
  # Réactiver: décommenter le bloc + libérer port 53 (désactiver systemd-resolved stub)
  #
