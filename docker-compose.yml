  #     - "8081:80/tcp"
  #   environment:
  #     - TZ=Europe/Paris
  #     - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD}
  #     - FTLCONF_dns_listeningMode=all
  #   volumes:
  #     - ./pihole/etc-pihole:/etc/pihole
  #     - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_NICE

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto_config:/mosquitto/config
      - ./mosquitto_data:/mosquitto/data
      - ./mosquitto_log:/mosquitto/log

  ambisync:
    container_name: ambisync
    build:
      context: .
      dockerfile: scripts/Dockerfile.ambisync
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./scripts:/app/scripts:ro
      - ./ambisync_config:/app/ambisync_config:ro
    command: ["python", "/app/scripts/philips_hue_ambisync.py"]
    environment:
      - PYTHONUNBUFFERED=1
