- id: tv_on_ambilight_vivid
  alias: TV ON → Ambilight Vivid
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: playing
  - platform: state
    entity_id: media_player.bedroom_tv
    to: idle
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'on'
  condition:
  - condition: time
    before: '22:00:00'
  action:
  - service: light.turn_on
    target:
      entity_id: light.philips_ambilight_ambilight
    data:
      effect: Vivid
      brightness: 255
- id: night_mode_ambilight
  alias: 22h → Ambilight doux
  triggers:
  - at: '22:00:00'
    trigger: time
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.bedroom_tv
      state: 'off'
  actions:
  - target:
      entity_id: light.philips_ambilight_ambilight
    data:
      effect: Natural
      brightness: 100
    action: light.turn_on
  - action: light.turn_on
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
    data:
      brightness: 60
  # TV OLED brightness not controllable via API
- id: tv_on_after_22h
  alias: TV ON après 22h → Ambilight doux
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: playing
  - platform: state
    entity_id: media_player.bedroom_tv
    to: idle
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'on'
  condition:
  - condition: time
    after: '22:00:00'
    before: 06:00:00
  action:
  - service: light.turn_on
    target:
      entity_id: light.philips_ambilight_ambilight
    data:
      effect: Standard
      brightness: 100
  - service: light.turn_on
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
    data:
      brightness: 60
  - service: shell_command.tv_brightness_low
- id: tv_off_lights_off
  alias: TV OFF → Hue OFF
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'off'
    for: 00:00:30
  action:
  - service: light.turn_off
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
- id: tv_on_hue_on
  alias: TV ON → Hue ON
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: playing
  - platform: state
    entity_id: media_player.bedroom_tv
    to: idle
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'on'
  action:
  - service: light.turn_on
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
    data:
      brightness: 200
      color_temp_kelvin: 2857

# ─── TELECOMMANDE HUE ───

# Bouton 1 - appui court : tout allumer
- id: remote_btn1_short
  alias: "Telecommande: ON"
  trigger:
  - platform: state
    entity_id: event.hue_dimmer_switch_1_bouton_1
    attribute: event_type
    to: short_release
  action:
  - service: light.turn_on
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
    data:
      brightness: 200
      color_temp_kelvin: 2857

