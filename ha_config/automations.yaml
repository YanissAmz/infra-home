- id: tv_on_ambilight_vivid
  alias: TV ON → Ambilight Vivid
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: playing
  - platform: state
    entity_id: media_player.bedroom_tv
    to: idle
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'on'
  condition:
  - condition: time
    after: '06:00:00'
    before: '22:00:00'
  action:
  - service: light.turn_on
    target:
      entity_id: light.philips_ambilight_ambilight
    data:
      effect: Vivid
      brightness: 255
    continue_on_error: true
  - action: shell_command.ambilight_brightness_high
    continue_on_error: true
- id: night_mode_ambilight
  alias: 22h → Ambilight doux
  triggers:
  - at: '22:00:00'
    trigger: time
  - trigger: homeassistant
    event: start
  conditions:
  - condition: time
    after: '22:00:00'
    before: '06:00:00'
  actions:
  - action: shell_command.ambilight_power_on
    continue_on_error: true
  - delay: '00:00:02'
  - action: light.turn_on
    target:
      entity_id: light.philips_ambilight_ambilight
    data:
      effect: Natural
      brightness: 100
    continue_on_error: true
  - action: shell_command.ambilight_natural
    continue_on_error: true
  - delay: '00:00:02'
  - action: shell_command.ambilight_brightness_low
    continue_on_error: true
  - action: light.turn_on
    target:
      entity_id: light.hue_color_lamp_1
    data:
      brightness: 20
- id: morning_mode_ambilight
  alias: 6h → Ambilight jour
  triggers:
  - at: '06:00:00'
    trigger: time
  - trigger: homeassistant
    event: start
  conditions:
  - condition: time
    after: '06:00:00'
    before: '22:00:00'
  actions:
  - action: shell_command.ambilight_power_on
    continue_on_error: true
  - delay: '00:00:02'
  - action: light.turn_on
    target:
      entity_id: light.philips_ambilight_ambilight
    data:
      effect: Vivid
      brightness: 255
    continue_on_error: true
  - action: shell_command.ambilight_vivid
    continue_on_error: true
  - delay: '00:00:02'
  - action: shell_command.ambilight_brightness_high
    continue_on_error: true
  - action: light.turn_on
    target:
      entity_id: light.hue_color_lamp_1
    data:
      brightness: 254
    continue_on_error: true
- id: tv_on_after_22h
  alias: TV ON après 22h → Ambilight doux
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: playing
  - platform: state
    entity_id: media_player.bedroom_tv
    to: idle
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'on'
  condition:
  - condition: time
    after: '22:00:00'
    before: '06:00:00'
  action:
  - action: shell_command.ambilight_power_on
    continue_on_error: true
  - delay: '00:00:02'
  - service: light.turn_on
    target:
      entity_id: light.philips_ambilight_ambilight
    data:
      effect: Natural
      brightness: 100
    continue_on_error: true
  - action: shell_command.ambilight_natural
    continue_on_error: true
  - delay: '00:00:02'
  - action: shell_command.ambilight_brightness_low
    continue_on_error: true
  - delay: '00:00:02'
  - action: shell_command.tv_picture_personal
    continue_on_error: true
  - service: light.turn_on
    target:
      entity_id: light.hue_color_lamp_1
    data:
      brightness: 20
  - service: light.turn_on
    target:
      entity_id: light.hue_smart_plug_1
- id: tv_off_lights_off
  alias: TV OFF → Hue + Govee + Plug OFF (filet 2h)
  # ⚠️ media_player.bedroom_tv est une entité Google Cast non fiable :
  # quand la TV est allumée mais sans session Cast active (Stremio, HDMI,
  # Projectivy, etc.), l'entité oscille en boucle entre 'off' et 'unavailable'
  # toutes les 1-3 min. Avec for:30s ça déclenchait des extinctions à tort.
  # Le vrai TV-off est détecté par le python sync via JointSPACE fail
  # (cf hue_off_all dans ambilight_unified_sync.py branche TV-off).
  # Cette automation HA reste comme filet de sécurité longue durée :
  # 2h de bedroom_tv off = TV vraiment pas utilisée depuis 2h, OK pour off.
  # TODO refactor demain : remplacer trigger par un command_line binary_sensor
  # qui check JointSPACE /powerstate (source fiable On/Standby).
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'off'
    for: 02:00:00
  action:
  - service: light.turn_off
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
      - light.hue_smart_plug_1
  - service: shell_command.govee_off
- id: tv_on_hue_on
  alias: TV ON → Hue ON (lamps + plug Govee)
  trigger:
  - platform: state
    entity_id: media_player.bedroom_tv
    to: playing
  - platform: state
    entity_id: media_player.bedroom_tv
    to: idle
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'on'
  action:
  - service: light.turn_on
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
    data:
      brightness: 254
      color_temp_kelvin: 2857
  - service: light.turn_on
    target:
      entity_id: light.hue_smart_plug_1

# ─── FORCE DAY MODE OVERRIDE ───
- id: force_day_mode_on
  alias: Mode jour force ON
  trigger:
  - platform: state
    entity_id: input_boolean.force_day_mode
    to: 'on'
  action:
  - service: shell_command.force_day_on

- id: force_day_mode_off
  alias: Mode jour force OFF
  trigger:
  - platform: state
    entity_id: input_boolean.force_day_mode
    to: 'off'
  action:
  - service: shell_command.force_day_off

# ─── CRASH HARD TOUR ───
# Si la Tour GPU disparait du reseau >60s (panic kernel, panne hardware,
# coupure courant), l'ExecStopPost de ambilight-sync ne fire pas. Ce filet
# de securite eteint Govee + Hue + plug independamment.
- id: tour_offline_lights_off
  alias: Tour GPU offline → Lumieres OFF
  trigger:
  - platform: state
    entity_id: binary_sensor.tour_gpu_online
    to: 'off'
    for: 00:01:00
  action:
  - service: light.turn_off
    target:
      entity_id:
      - light.hue_color_lamp_1
      - light.hue_color_lamp_2
      - light.hue_smart_plug_1
  - service: shell_command.govee_off

