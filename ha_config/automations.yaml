- id: ambilight_controller_bootstrap
  alias: HA start → restaurer etat ambilight
  trigger:
  - platform: homeassistant
    event: start
  action:
  - delay: '00:00:45'
  - service: shell_command.ambilight_ctl_bootstrap
    continue_on_error: true

- id: tv_on_ambilight_vivid
  alias: TV ON jour → restaurer scene active
  trigger:
  - platform: state
    entity_id: binary_sensor.tv_philips_power
    to: 'on'
  condition:
  - condition: time
    after: '06:00:00'
    before: '22:00:00'
  action:
  - service: script.sync_ambilight_mode_now
    continue_on_error: true
- id: night_mode_ambilight
  alias: 22h → Ambilight doux
  trigger:
  - platform: time
    at: '22:00:00'
  action:
  - service: script.mode_auto_nuit_now
    continue_on_error: true
- id: morning_mode_ambilight
  alias: 6h → Ambilight jour
  trigger:
  - platform: time
    at: '06:00:00'
  action:
  - service: script.mode_auto_jour_now
    continue_on_error: true
- id: tv_on_after_22h
  alias: TV ON nuit → restaurer scene active
  trigger:
  - platform: state
    entity_id: binary_sensor.tv_philips_power
    to: 'on'
  condition:
  - condition: time
    after: '22:00:00'
    before: '06:00:00'
  action:
  - service: script.sync_ambilight_mode_now
    continue_on_error: true
- id: tv_off_lights_off
  alias: TV OFF → Hue + Govee + Plug OFF
  # Trigger principal : binary_sensor.tv_philips_power (JointSPACE /powerstate)
  # — for:2min pour éviter les faux positifs sur transition courte.
  # Filet 2h : media_player.bedroom_tv (Cast) pour le cas exceptionnel
  # où JointSPACE serait down (bug xtv stopped=true, etc.).
  # Le script Python gère déjà l'extinction en runtime via hue_off_all().
  trigger:
  - platform: state
    entity_id: binary_sensor.tv_philips_power
    to: 'off'
    for: 00:02:00
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'off'
    for: 02:00:00
  action:
  - service: script.scene_off_now
    continue_on_error: true
- id: tv_on_hue_on
  alias: TV ON → Hue ON (lamps + plug Govee)
  # Trigger principal : binary_sensor.tv_philips_power (JointSPACE /powerstate)
  # — source fiable On/Standby, poll 15s.
  # Filet : media_player.bedroom_tv (Cast) pour les cas où JointSPACE est lent.
  trigger:
  - platform: state
    entity_id: binary_sensor.tv_philips_power
    to: 'on'
  - platform: state
    entity_id: media_player.bedroom_tv
    to: playing
  - platform: state
    entity_id: media_player.bedroom_tv
    to: idle
  - platform: state
    entity_id: media_player.bedroom_tv
    to: 'on'
  action:
  - service: script.sync_ambilight_mode_now
    continue_on_error: true

# ─── FORCE DAY MODE OVERRIDE ───
- id: force_day_mode_on
  alias: Mode jour force ON
  trigger:
  - platform: state
    entity_id: input_boolean.force_day_mode
    to: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.force_night_mode
  - service: shell_command.force_day_on

- id: force_day_mode_off
  alias: Mode jour force OFF
  trigger:
  - platform: state
    entity_id: input_boolean.force_day_mode
    to: 'off'
  action:
  - service: shell_command.force_day_off

- id: force_night_mode_on
  alias: Mode nuit force ON
  trigger:
  - platform: state
    entity_id: input_boolean.force_night_mode
    to: 'on'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.force_day_mode
  - service: shell_command.force_night_on

- id: force_night_mode_off
  alias: Mode nuit force OFF
  trigger:
  - platform: state
    entity_id: input_boolean.force_night_mode
    to: 'off'
  action:
  - service: shell_command.force_night_off

- id: ambilight_runtime_apply_on_change
  alias: Reglages runtime ambilight → appliquer
  trigger:
  - platform: state
    entity_id:
    - input_number.ambilight_night_start_hour
    - input_number.ambilight_night_end_hour
    - input_number.ambilight_hue_night_brightness_pct
    - input_number.ambilight_govee_night_brightness_pct
    - input_number.ambilight_led_night_scale_pct
    - input_number.ambilight_delta_threshold_day
    - input_number.ambilight_delta_threshold_night
    - input_boolean.ambilight_pc_auto_sync
  - platform: homeassistant
    event: start
  action:
  - delay: '00:00:10'
  - service: script.apply_ambilight_runtime_settings
    continue_on_error: true

- id: hyte_ambilight_apply_on_change
  alias: Reglages HYTE ambilight → appliquer
  trigger:
  - platform: state
    entity_id:
    - input_boolean.ambilight_hyte_auto_sync
    - input_select.ambilight_hyte_profile_manual
    - input_select.ambilight_hyte_profile_day
    - input_select.ambilight_hyte_profile_night
    - input_boolean.force_day_mode
    - input_boolean.force_night_mode
  - platform: homeassistant
    event: start
  action:
  - delay: '00:00:15'
  - service: script.apply_hyte_ambilight_profile
    continue_on_error: true

- id: ambilight_watchdog_notify
  alias: Watchdog ambilight → notification
  trigger:
  - platform: state
    entity_id: sensor.ambilight_watchdog
    to: stale
    for: 00:03:00
  action:
  - service: persistent_notification.create
    data:
      notification_id: ambilight_watchdog
      title: Ambilight watchdog
      message: >-
        Etat={{ states("sensor.ambilight_watchdog") }}
        | mode={{ state_attr("sensor.ambilight_watchdog", "mode") }}
        | TV={{ state_attr("sensor.ambilight_watchdog", "tv_power") }}
        | issues={{ state_attr("sensor.ambilight_watchdog", "issues") }}

- id: ambilight_watchdog_clear
  alias: Watchdog ambilight → clear notification
  trigger:
  - platform: state
    entity_id: sensor.ambilight_watchdog
    to: ok
    for: 00:02:00
  action:
  - service: persistent_notification.dismiss
    data:
      notification_id: ambilight_watchdog

- id: ambilight_watchdog_restart
  alias: Watchdog ambilight → auto restart
  trigger:
  - platform: state
    entity_id: sensor.ambilight_watchdog
    to: stale
    for: 00:15:00
  condition:
  - condition: state
    entity_id: input_boolean.ambilight_watchdog_auto_restart
    state: 'on'
  action:
  - service: shell_command.ambilight_ctl_sync_restart

# ─── CRASH HARD TOUR ───
# Si la Tour GPU disparait du reseau >60s (panic kernel, panne hardware,
# coupure courant), l'ExecStopPost de ambilight-sync ne fire pas. Ce filet
# de securite eteint Govee + Hue + plug independamment.
- id: tour_offline_lights_off
  alias: Tour GPU offline → Lumieres OFF
  trigger:
  - platform: state
    entity_id: binary_sensor.tour_gpu_online
    to: 'off'
    for: 00:01:00
  action:
  - service: script.scene_off_now
    continue_on_error: true

