
# Loads default set of integrations. Do not remove.
default_config:

# Toggle pour forcer le mode jour (override night mode du sync python)
# Le sync lit /config/.force_day toutes les 5s (cf is_night() dans ambilight_unified_sync.py)
input_boolean:
  force_day_mode:
    name: Mode jour force (override 22h-6h)
    icon: mdi:weather-sunny
  force_night_mode:
    name: Mode nuit force
    icon: mdi:weather-night

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

shell_command:
  # TV OLED brightness not controllable via API on 55OLED708
  # Ambilight brightness is controlled via light.philips_ambilight_ambilight entity instead
  # Ambilight sync service (via command bridge on host)
  ambisync_restart: "echo ambisync_restart > /config/commands/sync_$(date +%s).cmd"
  ambisync_stop: "echo ambisync_stop > /config/commands/sync_$(date +%s).cmd"
  ambisync_start: "echo ambisync_start > /config/commands/sync_$(date +%s).cmd"
  # Ambilight style via JointSPACE API (fallback when custom_ambilight fails)
  ambilight_natural: !secret shell_ambilight_natural
  ambilight_vivid: !secret shell_ambilight_vivid
  ambilight_power_on: !secret shell_ambilight_power_on
  ambilight_brightness_low: !secret shell_ambilight_brightness_low
  ambilight_brightness_high: !secret shell_ambilight_brightness_high
  # Picture style: 0=Personnalisé, 4=Filmmaker (à confirmer)
  tv_picture_personal: !secret shell_tv_picture_personal
  tv_picture_filmmaker: !secret shell_tv_picture_filmmaker
  # Govee LED strip control via LAN API (UDP)
  govee_off: !secret shell_govee_off
  govee_on: !secret shell_govee_on
  # Force day mode override — touche/supprime un flag fichier que le sync python lit dans is_night()
  force_day_on: "touch /config/.force_day"
  force_day_off: "rm -f /config/.force_day"
  force_night_on: "touch /config/.force_night"
  force_night_off: "rm -f /config/.force_night"
  # Firestick apps via ADB
  firestick_hd_stremio: !secret shell_firestick_hd_stremio
  firestick_hd_youtube: !secret shell_firestick_hd_youtube
  firestick_hd_iptv: !secret shell_firestick_hd_iptv

# Command-line sensors — read status files updated by cron on host
command_line:
  - sensor:
      name: Ambilight Sync Status
      command: "cat /config/status/ambisync.txt"
      scan_interval: 30
  - sensor:
      name: OpenRGB Server Status
      command: "cat /config/status/openrgb.txt"
      scan_interval: 30
  - sensor:
      name: Ambilight Mode
      command: "cat /config/status/ambilight_mode.txt 2>/dev/null || echo booting"
      scan_interval: 15
  - sensor:
      name: Ambilight Transport
      command: "cat /config/status/ambilight_transport.txt 2>/dev/null || echo starting"
      scan_interval: 15
  - sensor:
      name: Govee Target Brightness
      command: "cat /config/status/govee_target_brightness.txt 2>/dev/null || echo 0"
      unit_of_measurement: "%"
      scan_interval: 15
  - sensor:
      name: Hue Target Brightness
      command: "cat /config/status/hue_target_brightness.txt 2>/dev/null || echo 0"
      unit_of_measurement: "%"
      scan_interval: 15
  - sensor:
      name: Ambilight Color
      command: "cat /config/status/ambilight_color.txt 2>/dev/null || echo 0,0,0"
      scan_interval: 15
  # Pi-hole sensor désactivé 2026-04-09 (container Pi-hole supprimé, NextDNS gère l'ad-blocking)
  # - sensor:
  #     name: Pi-hole Blocked Today
  #     command: "cat /config/status/pihole.txt"
  #     scan_interval: 60
  - binary_sensor:
      name: TV Philips Online
      command: "cat /config/status/tv.txt"
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  # Source fiable TV on/off : JointSPACE /powerstate (On/Standby).
  # Remplace media_player.bedroom_tv (Cast entity — oscille off/unavailable
  # quand TV allumée sans session Cast active) comme trigger TV on/off.
  - binary_sensor:
      name: TV Philips Power
      command: !secret binary_sensor_tv_philips_power_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 15
      device_class: power
  - binary_sensor:
      name: Firestick HD Online
      command: !secret binary_sensor_firestick_hd_online_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  - binary_sensor:
      name: Livebox Online
      command: !secret binary_sensor_livebox_online_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  - binary_sensor:
      name: Tour GPU Online
      command: !secret binary_sensor_gpu_tower_online_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity

lovelace:
  dashboards:
    lovelace-home:
      mode: yaml
      title: Maison
      filename: ui-lovelace.yaml
      icon: mdi:home
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
