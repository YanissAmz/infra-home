
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

shell_command:
  # TV OLED brightness not controllable via API on 55OLED708
  # Ambilight brightness is controlled via light.philips_ambilight_ambilight entity instead
  # Ambilight sync service (via command bridge on host)
  ambisync_restart: "echo ambisync_restart > /config/commands/sync_$(date +%s).cmd"
  ambisync_stop: "echo ambisync_stop > /config/commands/sync_$(date +%s).cmd"
  ambisync_start: "echo ambisync_start > /config/commands/sync_$(date +%s).cmd"
  # Ambilight style via JointSPACE API (fallback when custom_ambilight fails)
  ambilight_natural: >-
    curl -sk --digest -u 'ambisync_yaniss01:6be351f9c5ca1919516df5be99c269cf9f5b334c7b4824f924b8ddb9698c5714'
    -X POST 'https://192.168.68.52:1926/6/ambilight/currentconfiguration'
    -H 'Content-Type: application/json'
    -d '{"styleName":"FOLLOW_VIDEO","isExpert":false,"menuSetting":"NATURAL"}'
  ambilight_vivid: >-
    curl -sk --digest -u 'ambisync_yaniss01:6be351f9c5ca1919516df5be99c269cf9f5b334c7b4824f924b8ddb9698c5714'
    -X POST 'https://192.168.68.52:1926/6/ambilight/currentconfiguration'
    -H 'Content-Type: application/json'
    -d '{"styleName":"FOLLOW_VIDEO","isExpert":false,"menuSetting":"VIVID"}'
  ambilight_power_on: >-
    curl -sk --digest -u 'ambisync_yaniss01:6be351f9c5ca1919516df5be99c269cf9f5b334c7b4824f924b8ddb9698c5714'
    -X POST 'https://192.168.68.52:1926/6/ambilight/power'
    -H 'Content-Type: application/json'
    -d '{"power":"On"}'
  ambilight_brightness_low: >-
    curl -sk --digest -u 'ambisync_yaniss01:6be351f9c5ca1919516df5be99c269cf9f5b334c7b4824f924b8ddb9698c5714'
    -X POST 'https://192.168.68.52:1926/6/menuitems/settings/update'
    -H 'Content-Type: application/json'
    -d '{"values":[{"value":{"Nodeid":2130968780,"Controllable":true,"Available":true,"data":{"value":3}}}]}'
  ambilight_brightness_high: >-
    curl -sk --digest -u 'ambisync_yaniss01:6be351f9c5ca1919516df5be99c269cf9f5b334c7b4824f924b8ddb9698c5714'
    -X POST 'https://192.168.68.52:1926/6/menuitems/settings/update'
    -H 'Content-Type: application/json'
    -d '{"values":[{"value":{"Nodeid":2130968780,"Controllable":true,"Available":true,"data":{"value":8}}}]}'
  # Picture style: 0=Personnalisé, 4=Filmmaker (à confirmer)
  tv_picture_personal: >-
    curl -sk --digest -u 'ambisync_yaniss01:6be351f9c5ca1919516df5be99c269cf9f5b334c7b4824f924b8ddb9698c5714'
    -X POST 'https://192.168.68.52:1926/6/menuitems/settings/update'
    -H 'Content-Type: application/json'
    -d '{"values":[{"value":{"Nodeid":2130968797,"Controllable":true,"Available":true,"data":{"selected_item":0}}}]}'
  tv_picture_filmmaker: >-
    curl -sk --digest -u 'ambisync_yaniss01:6be351f9c5ca1919516df5be99c269cf9f5b334c7b4824f924b8ddb9698c5714'
    -X POST 'https://192.168.68.52:1926/6/menuitems/settings/update'
    -H 'Content-Type: application/json'
    -d '{"values":[{"value":{"Nodeid":2130968797,"Controllable":true,"Available":true,"data":{"selected_item":4}}}]}'
  # Govee LED strip control via LAN API (UDP)
  govee_off: "echo '{\"msg\":{\"cmd\":\"turn\",\"data\":{\"value\":0}}}' | socat - UDP-SENDTO:192.168.68.59:4003"
  govee_on: "echo '{\"msg\":{\"cmd\":\"turn\",\"data\":{\"value\":1}}}' | socat - UDP-SENDTO:192.168.68.59:4003"
  # Firestick apps via ADB
  firestick_hd_stremio: "adb connect 192.168.1.13:5555 && adb -s 192.168.1.13:5555 shell am start -n com.stremio.one/.MainActivity"
  firestick_hd_youtube: "adb connect 192.168.1.13:5555 && adb -s 192.168.1.13:5555 shell am start -n com.amazon.firetv.youtube/.StartActivity"
  firestick_hd_iptv: "adb connect 192.168.1.13:5555 && adb -s 192.168.1.13:5555 shell am start -n com.lizardroid.tivimate/.ui.ActivitySplash"

# Command-line sensors — read status files updated by cron on host
command_line:
  - sensor:
      name: Ambilight Sync Status
      command: "cat /config/status/ambisync.txt"
      scan_interval: 30
  - sensor:
      name: OpenRGB Server Status
      command: "cat /config/status/openrgb.txt"
      scan_interval: 30
  # Pi-hole sensor désactivé 2026-04-09 (container Pi-hole supprimé, NextDNS gère l'ad-blocking)
  # - sensor:
  #     name: Pi-hole Blocked Today
  #     command: "cat /config/status/pihole.txt"
  #     scan_interval: 60
  - binary_sensor:
      name: TV Philips Online
      command: "cat /config/status/tv.txt"
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  - binary_sensor:
      name: Firestick HD Online
      command: "cat /config/status/firestick.txt"
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  - binary_sensor:
      name: Livebox Online
      command: "cat /config/status/livebox.txt"
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity

lovelace:
  mode: yaml
  resources: []
  dashboards:
    lovelace-home:
      mode: yaml
      title: Maison
      filename: ui-lovelace.yaml
      icon: mdi:home
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
