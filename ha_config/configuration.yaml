
# Loads default set of integrations. Do not remove.
default_config:

# Toggle pour forcer le mode jour (override night mode du sync python)
# Le sync lit /config/.force_day toutes les 5s (cf is_night() dans ambilight_unified_sync.py)
input_boolean:
  force_day_mode:
    name: Mode jour force (override 22h-6h)
    icon: mdi:weather-sunny
  force_night_mode:
    name: Mode nuit force
    icon: mdi:weather-night
  ambilight_pc_auto_sync:
    name: LEDs PC sync auto nuit/jour
    icon: mdi:desktop-tower-monitor
  ambilight_hyte_auto_sync:
    name: HYTE sync auto nuit/jour
    icon: mdi:monitor-dashboard
  ambilight_watchdog_auto_restart:
    name: Watchdog ambilight auto restart
    icon: mdi:restart-alert

input_select:
  ambilight_hyte_profile_manual:
    name: HYTE profil manuel
    options:
      - punchy
      - normal
      - soft
    initial: punchy
    icon: mdi:monitor-star
  ambilight_hyte_profile_day:
    name: HYTE profil jour auto
    options:
      - punchy
      - normal
      - soft
    initial: punchy
    icon: mdi:white-balance-sunny
  ambilight_hyte_profile_night:
    name: HYTE profil nuit auto
    options:
      - soft
      - normal
      - punchy
    initial: soft
    icon: mdi:weather-night

input_number:
  ambilight_night_start_hour:
    name: Ambilight nuit debut
    icon: mdi:clock-start
    min: 0
    max: 23
    step: 1
    mode: box
    initial: 22
  ambilight_night_end_hour:
    name: Ambilight nuit fin
    icon: mdi:clock-end
    min: 0
    max: 23
    step: 1
    mode: box
    initial: 6
  ambilight_hue_night_brightness_pct:
    name: Hue nuit intensite
    icon: mdi:lightbulb-night
    min: 1
    max: 100
    step: 1
    mode: slider
    initial: 30
    unit_of_measurement: "%"
  ambilight_govee_night_brightness_pct:
    name: Govee nuit intensite
    icon: mdi:led-strip-variant
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 1
    unit_of_measurement: "%"
  # Keep PC LEDs vivid at night for now; lower this later to sync them with
  # the automatic day/night profile again.
  ambilight_led_night_scale_pct:
    name: LEDs PC nuit intensite
    icon: mdi:memory
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 100
    unit_of_measurement: "%"
  ambilight_delta_threshold_day:
    name: Ambilight delta jour
    icon: mdi:tune-variant
    min: 1
    max: 100
    step: 1
    mode: box
    initial: 15
  ambilight_delta_threshold_night:
    name: Ambilight delta nuit
    icon: mdi:tune-variant
    min: 1
    max: 100
    step: 1
    mode: box
    initial: 40

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

shell_command:
  # TV OLED brightness not controllable via API on 55OLED708
  # Ambilight brightness is controlled via light.philips_ambilight_ambilight entity instead
  # Ambilight sync service (via command bridge on host)
  ambisync_restart: "echo ambisync_restart > /config/commands/sync_$(date +%s).cmd"
  ambisync_stop: "echo ambisync_stop > /config/commands/sync_$(date +%s).cmd"
  ambisync_start: "echo ambisync_start > /config/commands/sync_$(date +%s).cmd"
  ambilight_ctl_apply_current: "python3 /config/ambilight_control_api.py apply ha"
  ambilight_ctl_bootstrap: "python3 /config/ambilight_control_api.py bootstrap"
  ambilight_ctl_mode_day: "python3 /config/ambilight_control_api.py mode day"
  ambilight_ctl_mode_night: "python3 /config/ambilight_control_api.py mode night"
  ambilight_ctl_mode_auto: "python3 /config/ambilight_control_api.py mode auto"
  ambilight_ctl_profile_movie: "python3 /config/ambilight_control_api.py profile movie"
  ambilight_ctl_profile_gaming: "python3 /config/ambilight_control_api.py profile gaming"
  ambilight_ctl_profile_reading: "python3 /config/ambilight_control_api.py profile reading"
  ambilight_ctl_profile_sleep: "python3 /config/ambilight_control_api.py profile sleep"
  ambilight_ctl_profile_off: "python3 /config/ambilight_control_api.py profile off"
  ambilight_ctl_power_on: "python3 /config/ambilight_control_api.py power on"
  ambilight_ctl_power_off: "python3 /config/ambilight_control_api.py power off"
  ambilight_ctl_hyte_sync: >-
    python3 /config/ambilight_control_api.py hyte-sync
    {{ 1 if is_state("input_boolean.ambilight_hyte_auto_sync", "on") else 0 }}
    {{ states("input_select.ambilight_hyte_profile_manual") }}
  ambilight_ctl_pc_sync: >-
    python3 /config/ambilight_control_api.py pc-sync
    {{ 1 if is_state("input_boolean.ambilight_pc_auto_sync", "on") else 0 }}
    {{ states("input_number.ambilight_led_night_scale_pct")|int }}
  ambilight_ctl_sync_restart: "python3 /config/ambilight_control_api.py sync-service restart"
  ambilight_ctl_sync_stop: "python3 /config/ambilight_control_api.py sync-service stop"
  ambilight_ctl_sync_start: "python3 /config/ambilight_control_api.py sync-service start"
  # Ambilight style via JointSPACE API (fallback when custom_ambilight fails)
  ambilight_natural: !secret shell_ambilight_natural
  ambilight_vivid: !secret shell_ambilight_vivid
  ambilight_power_on: !secret shell_ambilight_power_on
  ambilight_power_off: !secret shell_ambilight_power_off
  ambilight_brightness_low: !secret shell_ambilight_brightness_low
  ambilight_brightness_high: !secret shell_ambilight_brightness_high
  # Picture style: 0=Personnalisé, 4=Filmmaker (à confirmer)
  tv_picture_personal: !secret shell_tv_picture_personal
  tv_picture_filmmaker: !secret shell_tv_picture_filmmaker
  # Govee LED strip control via LAN API (UDP)
  govee_off: !secret shell_govee_off
  govee_on: !secret shell_govee_on
  # Hue bridge direct commands — used for critical automations because the
  # HA Hue entities can come up unavailable during startup.
  hue_mode_day: !secret shell_hue_mode_day
  hue_mode_night: !secret shell_hue_mode_night
  hue_tv_on: !secret shell_hue_tv_on
  hue_all_off: !secret shell_hue_all_off
  hue_scene_cinema: !secret shell_hue_scene_cinema
  hue_scene_gaming: !secret shell_hue_scene_gaming
  hue_scene_lecture: !secret shell_hue_scene_lecture
  hue_scene_night: !secret shell_hue_scene_night
  hue_brightness_up: !secret shell_hue_brightness_up
  hue_brightness_down: !secret shell_hue_brightness_down
  hyte_profile_soft: "python3 /config/hyte_ambilight_profile.py set soft >/dev/null"
  hyte_profile_normal: "python3 /config/hyte_ambilight_profile.py set normal >/dev/null"
  hyte_profile_punchy: "python3 /config/hyte_ambilight_profile.py set punchy >/dev/null"
  # Force day mode override — touche/supprime un flag fichier que le sync python lit dans is_night()
  force_day_on: "touch /config/.force_day"
  force_day_off: "rm -f /config/.force_day"
  force_night_on: "touch /config/.force_night"
  force_night_off: "rm -f /config/.force_night"
  ambilight_runtime_write: >-
    python3 /config/write_runtime_overrides.py
    {{ states("input_number.ambilight_night_start_hour")|int }}
    {{ states("input_number.ambilight_night_end_hour")|int }}
    {{ states("input_number.ambilight_hue_night_brightness_pct")|int }}
    {{ states("input_number.ambilight_govee_night_brightness_pct")|int }}
    {{ states("input_number.ambilight_led_night_scale_pct")|int }}
    {{ states("input_number.ambilight_delta_threshold_day")|int }}
    {{ states("input_number.ambilight_delta_threshold_night")|int }}
    {{ 1 if is_state("input_boolean.ambilight_pc_auto_sync", "on") else 0 }}
  # Firestick apps via ADB
  firestick_hd_stremio: !secret shell_firestick_hd_stremio
  firestick_hd_youtube: !secret shell_firestick_hd_youtube
  firestick_hd_iptv: !secret shell_firestick_hd_iptv

# Command-line sensors — read status files updated by cron on host
command_line:
  - sensor:
      name: Ambilight Sync Status
      command: "cat /config/status/ambisync.txt"
      scan_interval: 30
  - sensor:
      name: OpenRGB Server Status
      command: "cat /config/status/openrgb.txt"
      scan_interval: 30
  - sensor:
      name: Ambilight Mode
      command: "cat /config/status/ambilight_mode.txt 2>/dev/null || echo booting"
      scan_interval: 15
  - sensor:
      name: Ambilight Transport
      command: "cat /config/status/ambilight_transport.txt 2>/dev/null || echo starting"
      scan_interval: 15
  - sensor:
      name: Govee Target Brightness
      command: "cat /config/status/govee_target_brightness.txt 2>/dev/null || echo 0"
      unit_of_measurement: "%"
      scan_interval: 15
  - sensor:
      name: Hue Target Brightness
      command: "cat /config/status/hue_target_brightness.txt 2>/dev/null || echo 0"
      unit_of_measurement: "%"
      scan_interval: 15
  - sensor:
      name: Ambilight Color
      command: "cat /config/status/ambilight_color.txt 2>/dev/null || echo 0,0,0"
      scan_interval: 15
  - sensor:
      name: Ambilight Active Profile
      command: "cat /config/status/ambilight_active_profile.txt 2>/dev/null || echo unknown"
      scan_interval: 15
  - sensor:
      name: Ambilight Controller Mode
      command: "cat /config/status/ambilight_controller_mode.txt 2>/dev/null || echo unknown"
      scan_interval: 15
  - sensor:
      name: Ambilight Power State
      command: "cat /config/status/ambilight_power_state.txt 2>/dev/null || echo unknown"
      scan_interval: 15
  - sensor:
      name: HYTE Ambilight Profile
      command: "python3 /config/hyte_ambilight_profile.py get 2>/dev/null || echo unknown"
      scan_interval: 30
  - sensor:
      name: Ambilight Watchdog
      command: "python3 /config/check_ambilight_watchdog.py"
      value_template: "{{ value_json.state }}"
      json_attributes:
        - issues
        - mode_age_s
        - ambilight_color_age_s
        - transport_age_s
        - govee_target_age_s
        - hue_target_age_s
        - tv_power
        - mode
      scan_interval: 60
  # Pi-hole sensor désactivé 2026-04-09 (container Pi-hole supprimé, NextDNS gère l'ad-blocking)
  # - sensor:
  #     name: Pi-hole Blocked Today
  #     command: "cat /config/status/pihole.txt"
  #     scan_interval: 60
  - binary_sensor:
      name: TV Philips Online
      command: "cat /config/status/tv.txt"
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  # Source fiable TV on/off : JointSPACE /powerstate (On/Standby).
  # Remplace media_player.bedroom_tv (Cast entity — oscille off/unavailable
  # quand TV allumée sans session Cast active) comme trigger TV on/off.
  - binary_sensor:
      name: TV Philips Power
      command: !secret binary_sensor_tv_philips_power_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 15
      device_class: power
  - binary_sensor:
      name: Firestick HD Online
      command: !secret binary_sensor_firestick_hd_online_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  - binary_sensor:
      name: Livebox Online
      command: !secret binary_sensor_livebox_online_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity
  - binary_sensor:
      name: Tour GPU Online
      command: !secret binary_sensor_gpu_tower_online_command
      payload_on: "ON"
      payload_off: "OFF"
      scan_interval: 30
      device_class: connectivity

template:
  - sensor:
      - name: Ambilight PC Mode
        icon: mdi:desktop-tower-monitor
        state: >-
          {% if is_state('input_boolean.ambilight_pc_auto_sync', 'on') %}
            auto
          {% else %}
            manual_high
          {% endif %}
      - name: Ambilight HYTE Mode
        icon: mdi:monitor-dashboard
        state: >-
          {% if is_state('input_boolean.ambilight_hyte_auto_sync', 'on') %}
            {% set hour = now().hour %}
            {% set scheduled_night = hour >= 22 or hour < 6 %}
            {% set night = is_state('input_boolean.force_night_mode', 'on')
              or (is_state('input_boolean.force_day_mode', 'off') and scheduled_night) %}
            {% if night %}
              auto_{{ states('input_select.ambilight_hyte_profile_night') }}
            {% else %}
              auto_{{ states('input_select.ambilight_hyte_profile_day') }}
            {% endif %}
          {% else %}
            manual_{{ states('input_select.ambilight_hyte_profile_manual') }}
          {% endif %}

lovelace:
  dashboards:
    lovelace-home:
      mode: yaml
      title: Maison
      filename: ui-lovelace.yaml
      icon: mdi:home
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
