shell_ambilight_natural: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/ambilight/currentconfiguration'
  -H 'Content-Type: application/json'
  -d '{"styleName":"FOLLOW_VIDEO","isExpert":false,"menuSetting":"NATURAL"}'

shell_ambilight_vivid: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/ambilight/currentconfiguration'
  -H 'Content-Type: application/json'
  -d '{"styleName":"FOLLOW_VIDEO","isExpert":false,"menuSetting":"VIVID"}'

shell_ambilight_power_on: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/ambilight/power'
  -H 'Content-Type: application/json'
  -d '{"power":"On"}'

shell_ambilight_brightness_low: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968780,"Controllable":true,"Available":true,"data":{"value":3}}}]}'

shell_ambilight_brightness_high: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968780,"Controllable":true,"Available":true,"data":{"value":8}}}]}'

shell_tv_picture_personal: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968797,"Controllable":true,"Available":true,"data":{"selected_item":0}}}]}'

shell_tv_picture_filmmaker: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968797,"Controllable":true,"Available":true,"data":{"selected_item":4}}}]}'

shell_govee_off: >-
  echo '{"msg":{"cmd":"turn","data":{"value":0}}}' | socat - UDP-SENDTO:your_govee_ip:4003

shell_govee_on: >-
  echo '{"msg":{"cmd":"turn","data":{"value":1}}}' | socat - UDP-SENDTO:your_govee_ip:4003

shell_firestick_hd_stremio: >-
  adb connect your_firestick_ip:5555 && adb -s your_firestick_ip:5555 shell am start -n com.stremio.one/.MainActivity

shell_firestick_hd_youtube: >-
  adb connect your_firestick_ip:5555 && adb -s your_firestick_ip:5555 shell am start -n com.amazon.firetv.youtube/.StartActivity

shell_firestick_hd_iptv: >-
  adb connect your_firestick_ip:5555 && adb -s your_firestick_ip:5555 shell am start -n com.lizardroid.tivimate/.ui.ActivitySplash

binary_sensor_tv_philips_power_command: >-
  curl -sk --digest
  -u 'your_device_id:your_auth_key'
  https://your_tv_host:1926/6/powerstate 2>/dev/null
  | python3 -c "import sys,json; d=json.load(sys.stdin); print('ON' if d.get('powerstate')=='On' else 'OFF')"
  2>/dev/null || echo OFF

binary_sensor_firestick_hd_online_command: >-
  cat /config/status/firestick.txt

binary_sensor_livebox_online_command: >-
  cat /config/status/livebox.txt

binary_sensor_gpu_tower_online_command: >-
  ping -c 1 -W 2 your_gpu_host >/dev/null 2>&1 && echo ON || echo OFF
