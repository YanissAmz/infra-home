shell_ambilight_natural: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/ambilight/currentconfiguration'
  -H 'Content-Type: application/json'
  -d '{"styleName":"FOLLOW_VIDEO","isExpert":false,"menuSetting":"NATURAL"}'

shell_ambilight_vivid: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/ambilight/currentconfiguration'
  -H 'Content-Type: application/json'
  -d '{"styleName":"FOLLOW_VIDEO","isExpert":false,"menuSetting":"VIVID"}'

shell_ambilight_power_on: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/ambilight/power'
  -H 'Content-Type: application/json'
  -d '{"power":"On"}'

shell_ambilight_power_off: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/ambilight/power'
  -H 'Content-Type: application/json'
  -d '{"power":"Off"}'

shell_ambilight_brightness_low: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968780,"Controllable":true,"Available":true,"data":{"value":3}}}]}'

shell_ambilight_brightness_high: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968780,"Controllable":true,"Available":true,"data":{"value":8}}}]}'

shell_tv_picture_personal: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968797,"Controllable":true,"Available":true,"data":{"selected_item":0}}}]}'

shell_tv_picture_filmmaker: >-
  curl -sk --digest -u 'your_device_id:your_auth_key'
  -X POST 'https://your_tv_host:1926/6/menuitems/settings/update'
  -H 'Content-Type: application/json'
  -d '{"values":[{"value":{"Nodeid":2130968797,"Controllable":true,"Available":true,"data":{"selected_item":4}}}]}'

shell_govee_off: >-
  echo '{"msg":{"cmd":"turn","data":{"value":0}}}' | socat - UDP-SENDTO:your_govee_ip:4003

shell_govee_on: >-
  echo '{"msg":{"cmd":"turn","data":{"value":1}}}' | socat - UDP-SENDTO:your_govee_ip:4003

shell_hue_mode_day: >-
  sh -lc 'for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"on\":true,\"bri\":254,\"ct\":350}" --max-time 2 >/dev/null; done'

shell_hue_mode_night: >-
  sh -lc 'for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"on\":true,\"bri\":20,\"ct\":454}" --max-time 2 >/dev/null; done'

shell_hue_tv_on: >-
  sh -lc 'curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/3/state" -d "{\"on\":true}" --max-time 2 >/dev/null; for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"on\":true,\"bri\":254,\"ct\":350}" --max-time 2 >/dev/null; done'

shell_hue_all_off: >-
  sh -lc 'for lid in 1 2 3; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"on\":false}" --max-time 2 >/dev/null; done'

shell_hue_scene_cinema: >-
  sh -lc 'curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/3/state" -d "{\"on\":true}" --max-time 2 >/dev/null; for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"on\":true,\"bri\":30,\"ct\":500}" --max-time 2 >/dev/null; done'

shell_hue_scene_gaming: >-
  sh -lc 'curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/3/state" -d "{\"on\":true}" --max-time 2 >/dev/null; curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/1/state" -d "{\"on\":true,\"xy\":[0.1668,0.1205],\"bri\":180}" --max-time 2 >/dev/null; curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/2/state" -d "{\"on\":true,\"xy\":[0.5459,0.2781],\"bri\":180}" --max-time 2 >/dev/null'

shell_hue_scene_lecture: >-
  sh -lc 'curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/3/state" -d "{\"on\":true}" --max-time 2 >/dev/null; for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"on\":true,\"bri\":255,\"ct\":300}" --max-time 2 >/dev/null; done'

shell_hue_scene_night: >-
  sh -lc 'curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/3/state" -d "{\"on\":false}" --max-time 2 >/dev/null; for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"on\":true,\"bri\":15,\"ct\":454}" --max-time 2 >/dev/null; done'

shell_hue_brightness_up: >-
  sh -lc 'for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"bri_inc\":50}" --max-time 2 >/dev/null; done'

shell_hue_brightness_down: >-
  sh -lc 'for lid in 1 2; do curl -sf -X PUT "http://your_hue_bridge/api/your_hue_token/lights/$lid/state" -d "{\"bri_inc\":-50}" --max-time 2 >/dev/null; done'

shell_firestick_hd_stremio: >-
  adb connect your_firestick_ip:5555 && adb -s your_firestick_ip:5555 shell am start -n com.stremio.one/.MainActivity

shell_firestick_hd_youtube: >-
  adb connect your_firestick_ip:5555 && adb -s your_firestick_ip:5555 shell am start -n com.amazon.firetv.youtube/.StartActivity

shell_firestick_hd_iptv: >-
  adb connect your_firestick_ip:5555 && adb -s your_firestick_ip:5555 shell am start -n com.lizardroid.tivimate/.ui.ActivitySplash

binary_sensor_tv_philips_power_command: >-
  curl -sk --digest
  -u 'your_device_id:your_auth_key'
  https://your_tv_host:1926/6/powerstate 2>/dev/null
  | python3 -c "import sys,json; d=json.load(sys.stdin); print('ON' if d.get('powerstate')=='On' else 'OFF')"
  2>/dev/null || echo OFF

binary_sensor_firestick_hd_online_command: >-
  cat /config/status/firestick.txt

binary_sensor_livebox_online_command: >-
  cat /config/status/livebox.txt

binary_sensor_gpu_tower_online_command: >-
  ping -c 1 -W 2 your_gpu_host >/dev/null 2>&1 && echo ON || echo OFF
