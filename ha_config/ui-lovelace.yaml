title: Maison Yaniss
views:

  # ─── CHAMBRE ───
  - title: Chambre
    path: chambre
    icon: mdi:bed
    cards:

      # TV Philips
      - type: vertical-stack
        title: TV Philips OLED 55
        cards:
          - type: media-control
            entity: media_player.bedroom_tv
          - type: light
            entity: light.philips_ambilight_ambilight
            name: Ambilight

      # Eclairage Hue
      - type: vertical-stack
        title: Eclairage Hue
        cards:
          - type: markdown
            content: |
              Lampe 1 / 2 sont preparees dans HA mais pas encore branchees.
              La prise Zigbee reste le relai mesh actif pour l'instant.
          - type: horizontal-stack
            cards:
              - type: light
                entity: light.hue_color_lamp_1
                name: Lampe 1
              - type: light
                entity: light.hue_color_lamp_2
                name: Lampe 2
          - type: entities
            entities:
              - entity: light.hue_smart_plug_1
                name: Prise Zigbee (relay mesh)
                icon: mdi:power-plug

      # Scenes + modes
      - type: vertical-stack
        title: Ambiances et modes
        cards:
          - type: horizontal-stack
            cards:
              - type: button
                name: Cinema
                icon: mdi:movie-open
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: script.scene_cinema_now
              - type: button
                name: Gaming
                icon: mdi:gamepad-variant
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: script.scene_gaming_now
              - type: button
                name: Lecture
                icon: mdi:book-open-variant
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: script.scene_lecture_now
          - type: horizontal-stack
            cards:
              - type: button
                name: Mode nuit
                icon: mdi:weather-night
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: script.mode_nuit_now
              - type: button
                name: Mode jour
                icon: mdi:brightness-7
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: script.mode_jour_now
              - type: button
                name: Mode auto
                icon: mdi:home-clock
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: script.mode_auto_now
              - type: button
                name: Tout OFF
                icon: mdi:power-sleep
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: script.scene_off_now

      # Telecommande
      - type: vertical-stack
        title: Telecommande Hue
        cards:
          - type: entities
            entities:
              - entity: sensor.hue_dimmer_switch_1_batterie
                name: Batterie
                icon: mdi:battery
              - entity: sensor.hue_dimmer_switch_1_connectivite_zigbee
                name: Signal Zigbee
                icon: mdi:zigbee
          - type: markdown
            content: |
              **Mapping boutons :**
              | Bouton | Appui court | Appui long |
              |--------|------------|------------|
              | **1** (haut) | Allumer lampes | Gaming |
              | **2** | Brightness + | Lecture |
              | **3** | Brightness - | Cinema |
              | **4** (bas) | Tout OFF | Nuit |

      # Automations
      - type: entities
        title: Regles auto (enable/disable)
        show_header_toggle: false
        entities:
          - entity: automation.tv_on_ambilight_vivid
            name: TV ON → Vivid (jour)
            icon: mdi:brightness-7
          - entity: automation.22h_ambilight_doux
            name: 22h → Mode nuit
            icon: mdi:weather-night
          - entity: automation.6h_ambilight_jour
            name: 6h → Mode jour
            icon: mdi:white-balance-sunny
          - entity: automation.tv_on_apres_22h_ambilight_doux
            name: TV ON → Doux (nuit)
            icon: mdi:moon-waning-crescent
          - entity: automation.tv_off_hue_off
            name: TV OFF → Lumieres OFF
            icon: mdi:lightbulb-off
          - entity: automation.tv_on_hue_on
            name: TV ON → Lumieres ON
            icon: mdi:lightbulb-on

  # ─── FIRESTICKS ───
  - title: Firesticks
    path: firesticks
    icon: mdi:fire
    cards:

      # Firestick HD (cuisine/chambre)
      - type: vertical-stack
        title: Firestick HD
        cards:
          - type: horizontal-stack
            cards:
              - type: button
                name: Stremio
                icon: mdi:filmstrip
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: shell_command.firestick_hd_stremio
              - type: button
                name: YouTube
                icon: mdi:youtube
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: shell_command.firestick_hd_youtube
              - type: button
                name: IPTV
                icon: mdi:television-classic
                icon_height: 40px
                tap_action:
                  action: call-service
                  service: shell_command.firestick_hd_iptv

      # Status
      - type: entities
        title: Status Firesticks
        entities:
          - entity: binary_sensor.firestick_hd_online
            name: Firestick HD
            icon: mdi:fire

  # ─── SERVICES ───
  - title: Services
    path: services
    icon: mdi:server
    cards:

      # Ambilight Sync
      - type: vertical-stack
        title: Ambilight Sync
        cards:
          - type: entities
            entities:
              - entity: sensor.ambilight_sync_status
                name: Sync TV → Hue + LEDs
                icon: mdi:sync
              - entity: sensor.ambilight_mode
                name: Mode courant
                icon: mdi:tune-variant
              - entity: sensor.ambilight_controller_mode
                name: Mode controleur
                icon: mdi:state-machine
              - entity: sensor.ambilight_power_state
                name: Power outputs
                icon: mdi:power
              - entity: sensor.ambilight_active_profile
                name: Profil actif
                icon: mdi:palette-swatch
              - entity: sensor.ambilight_transport
                name: Transport Hue
                icon: mdi:lightning-bolt
              - entity: sensor.govee_target_brightness
                name: Cible Govee
                icon: mdi:led-strip-variant
              - entity: sensor.hue_target_brightness
                name: Cible Hue
                icon: mdi:lightbulb-multiple
              - entity: sensor.hyte_ambilight_profile
                name: Profil HYTE
                icon: mdi:monitor-star
              - entity: sensor.ambilight_hyte_mode
                name: Mode HYTE
                icon: mdi:monitor-dashboard
              - entity: sensor.ambilight_pc_mode
                name: Mode LEDs PC
                icon: mdi:desktop-tower-monitor
              - entity: sensor.ambilight_watchdog
                name: Watchdog
                icon: mdi:shield-check
              - entity: sensor.openrgb_server_status
                name: OpenRGB Server
                icon: mdi:led-strip-variant
              - entity: input_boolean.force_day_mode
                name: Mode jour force (override 22h-6h)
                icon: mdi:weather-sunny
              - entity: input_boolean.force_night_mode
                name: Mode nuit force
                icon: mdi:weather-night
              - entity: input_boolean.ambilight_pc_auto_sync
                name: LEDs PC auto
                icon: mdi:desktop-tower-monitor
              - entity: input_boolean.ambilight_hyte_auto_sync
                name: HYTE auto
                icon: mdi:monitor-dashboard
              - entity: input_boolean.ambilight_watchdog_auto_restart
                name: Watchdog auto restart
                icon: mdi:restart-alert
          - type: entities
            title: Reglages runtime
            entities:
              - entity: input_number.ambilight_night_start_hour
                name: Debut nuit
              - entity: input_number.ambilight_night_end_hour
                name: Fin nuit
              - entity: input_number.ambilight_hue_night_brightness_pct
                name: Hue nuit
              - entity: input_number.ambilight_govee_night_brightness_pct
                name: Govee nuit
              - entity: input_number.ambilight_led_night_scale_pct
                name: LEDs PC nuit
              - entity: input_number.ambilight_delta_threshold_day
                name: Delta jour
              - entity: input_number.ambilight_delta_threshold_night
                name: Delta nuit
          - type: entities
            title: HYTE
            entities:
              - entity: input_select.ambilight_hyte_profile_manual
                name: Profil manuel
              - entity: input_select.ambilight_hyte_profile_day
                name: Profil auto jour
              - entity: input_select.ambilight_hyte_profile_night
                name: Profil auto nuit
          - type: markdown
            title: Raccourcis
            content: |
              `HYTE auto` suit les profils jour/nuit.
              `LEDs PC auto` redonne la main au niveau nuit configure.
              En manuel, HYTE reste sur son profil choisi et le PC reste a `100%` la nuit.
              `Tout OFF` coupe les sorties sans perdre la scene de reprise pour le prochain `TV ON`.
          - type: horizontal-stack
            cards:
              - type: button
                name: HYTE Soft
                icon: mdi:blur
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: script.hyte_manual_soft_now
              - type: button
                name: HYTE Normal
                icon: mdi:brightness-5
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: script.hyte_manual_normal_now
              - type: button
                name: HYTE Punchy
                icon: mdi:star-four-points
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: script.hyte_manual_punchy_now
              - type: button
                name: HYTE Auto
                icon: mdi:home-clock
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: script.hyte_auto_now
          - type: horizontal-stack
            cards:
              - type: button
                name: PC Manuel haut
                icon: mdi:led-strip-variant
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: script.pc_leds_manual_high_now
              - type: button
                name: PC Auto
                icon: mdi:home-clock
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: script.pc_leds_auto_now
          - type: horizontal-stack
            cards:
              - type: button
                name: Restart Sync
                icon: mdi:restart
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: shell_command.ambilight_ctl_sync_restart
              - type: button
                name: Stop Sync
                icon: mdi:stop
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: shell_command.ambilight_ctl_sync_stop
              - type: button
                name: Start Sync
                icon: mdi:play
                icon_height: 35px
                tap_action:
                  action: call-service
                  service: shell_command.ambilight_ctl_sync_start

      # Pi-hole carte désactivée 2026-04-09 (container supprimé, NextDNS gère l'ad-blocking)
      # - type: vertical-stack
      #   title: Pi-hole DNS
      #   cards:
      #     - type: entities
      #       entities:
      #         - entity: sensor.pi_hole_blocked_today
      #           name: Requetes bloquees
      #           icon: mdi:shield-check
      #     - type: markdown
      #       content: |
      #         **Admin Pi-hole** : [http://localhost:8081/admin](http://localhost:8081/admin)

      # Docker stack
      - type: markdown
        title: Stack (GPU Tower)
        content: |
          | Service | Port | Role |
          |---------|------|------|
          | **Home Assistant** | 8123 | Orchestrateur |
          | **OpenRGB** | 6742 | LED sync |
          | **Ambilight Sync** | — | TV→Hue+LEDs |

  # ─── RESEAU ───
  - title: Reseau
    path: reseau
    icon: mdi:lan
    cards:

      # Ping status
      - type: vertical-stack
        title: Appareils
        cards:
          - type: entities
            entities:
              - entity: binary_sensor.tv_philips_online
                name: TV Philips (192.168.68.52)
                icon: mdi:television
              - entity: binary_sensor.tour_gpu_online
                name: Tour GPU (192.168.68.55)
                icon: mdi:desktop-tower
              - entity: binary_sensor.firestick_hd_online
                name: Firestick HD (192.168.1.13)
                icon: mdi:fire
              - entity: binary_sensor.livebox_online
                name: Livebox (192.168.1.1)
                icon: mdi:router-wireless

      # Zigbee mesh
      - type: entities
        title: Mesh Zigbee
        entities:
          - entity: sensor.hue_bridge_connectivite_zigbee
            name: Bridge Hue
            icon: mdi:bridge
          - entity: sensor.hue_color_lamp_1_connectivite_zigbee
            name: Lampe 1
            icon: mdi:lamp
          - entity: sensor.hue_color_lamp_2_connectivite_zigbee
            name: Lampe 2
            icon: mdi:lamp
          - entity: sensor.hue_smart_plug_1_connectivite_zigbee
            name: Prise relay
            icon: mdi:power-plug
          - entity: sensor.hue_dimmer_switch_1_connectivite_zigbee
            name: Telecommande
            icon: mdi:remote

      # Infos
      - type: markdown
        title: Tableau appareils
        content: |
          | Appareil | IP | Acces |
          |----------|----|-------|
          | TV Philips 55OLED708 | 192.168.68.52 | JointSPACE + ADB |
          | Bridge Hue | DHCP | REST API |
          | Firestick HD | 192.168.1.13 | ADB |
          | Firestick 4K (soeur) | — | ADB |
          | Livebox W7 | 192.168.1.1 | Sysbus API |
          | GPU Tower | localhost | Docker + systemd |

      # Meteo
      - type: weather-forecast
        entity: weather.forecast_maison
        show_forecast: true

  # ─── SYSTEME ───
  - title: Systeme
    path: systeme
    icon: mdi:cog
    cards:

      # Updates
      - type: entities
        title: Mises a jour
        entities:
          - entity: update.hacs_update
            name: HACS
          - entity: update.custom_ambilight_update
            name: Custom Ambilight
